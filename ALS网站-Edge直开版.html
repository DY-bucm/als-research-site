<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ALS 前沿研究进展情报站 Edge 直开版</title>
    <style>:root {
  color-scheme: light;
  --bg: #f5f7f6;
  --panel: #ffffff;
  --ink: #14201d;
  --muted: #5e6b66;
  --line: #dfe7e3;
  --accent: #0f766e;
  --accent-strong: #0b5f59;
  --accent-soft: #dff4ef;
  --warn: #a15c07;
  --warn-soft: #fff2d7;
  --shadow: 0 12px 28px rgba(20, 32, 29, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--ink);
}

a {
  color: var(--accent-strong);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px clamp(16px, 4vw, 44px);
  background: rgba(255, 255, 255, 0.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(14px);
}

.topnav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.nav-link {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  background: #fff;
  color: var(--accent-strong);
  font-size: 13px;
  font-weight: 700;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-weight: 800;
  letter-spacing: 0;
}

.brand strong,
.brand span {
  display: block;
}

.brand span {
  margin-top: 2px;
  color: var(--muted);
  font-size: 13px;
}

.status-pill {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--muted);
  background: #fff;
  font-size: 13px;
  white-space: nowrap;
}

main {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
}

.dashboard {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 22px;
  padding: 34px 0 22px;
}

.intro {
  padding: 26px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(135deg, #ffffff, #eef8f5);
  box-shadow: var(--shadow);
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--accent-strong);
  font-size: 13px;
  font-weight: 700;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  max-width: 760px;
  margin-bottom: 12px;
  font-size: clamp(30px, 4vw, 52px);
  line-height: 1.08;
}

.lead {
  max-width: 760px;
  margin-bottom: 0;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.75;
}

.metrics {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.metrics div {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.metrics span {
  font-size: 42px;
  font-weight: 800;
  line-height: 1;
}

.metrics small {
  color: var(--muted);
}

.controls {
  display: flex;
  align-items: end;
  gap: 14px;
  margin-bottom: 22px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.trends,
.digest {
  margin-bottom: 22px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.section-head h2 {
  margin-bottom: 0;
  font-size: 22px;
}

.section-head span {
  color: var(--muted);
  font-size: 13px;
}

.digest-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
}

.trend-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.trend-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 13px;
  background: #fbfdfc;
}

.trend-card h3 {
  margin: 0 0 12px;
  font-size: 16px;
}

.trend-bars {
  display: grid;
  gap: 9px;
}

.trend-row {
  display: grid;
  grid-template-columns: minmax(70px, 1fr) 1.6fr 24px;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 12px;
}

.trend-row div {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: #e9efec;
}

.trend-row i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
}

.trend-row b {
  color: var(--ink);
  text-align: right;
}

.digest-card {
  display: flex;
  min-height: 220px;
  flex-direction: column;
  gap: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 13px;
  background: #fbfdfc;
}

.digest-card h3 {
  margin: 0;
  font-size: 15px;
  line-height: 1.45;
}

.digest-card p {
  flex: 1;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.searchbox {
  flex: 1 1 320px;
}

.searchbox span {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 13px;
}

input {
  width: 100%;
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 12px;
  color: var(--ink);
  font: inherit;
}

.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.mini-select {
  display: grid;
  gap: 7px;
  min-width: 150px;
  color: var(--muted);
  font-size: 13px;
}

select {
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 10px;
  background: #fff;
  color: var(--ink);
  font: inherit;
}

.check-filter {
  display: flex;
  align-items: center;
  gap: 7px;
  min-height: 42px;
  color: var(--muted);
  font-size: 13px;
}

.check-filter input {
  width: auto;
  min-height: 0;
}

button,
.chip {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 13px;
  background: #fff;
  color: var(--ink);
  font: inherit;
  cursor: pointer;
}

button:hover,
.chip:hover {
  border-color: var(--accent);
}

.feed-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

button.active,
.chip.active {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.layout {
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr);
  gap: 22px;
}

.sidebar {
  align-self: start;
  position: sticky;
  top: 86px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.sidebar h2,
.feed-header h2 {
  margin-bottom: 12px;
  font-size: 18px;
}

.topic-list {
  display: grid;
  gap: 10px;
  margin-bottom: 24px;
}

.topic {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  padding-bottom: 9px;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  font-size: 14px;
}

.topic strong {
  color: var(--ink);
}

.update-steps {
  margin: 0;
  padding-left: 20px;
  color: var(--muted);
  line-height: 1.7;
}

.feed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.feed-list {
  display: grid;
  gap: 14px;
}

.item {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: 0 5px 16px rgba(20, 32, 29, 0.05);
}

.item-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
}

.badge {
  border-radius: 999px;
  padding: 4px 8px;
  background: var(--accent-soft);
  color: var(--accent-strong);
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}

.badge.high {
  background: var(--warn-soft);
  color: var(--warn);
}

.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}

.badge.review {
  background: #eef1f4;
  color: #46515c;
}

.badge.reviewed {
  background: #e6f5df;
  color: #326212;
}

.badge.featured {
  background: #eef4ff;
  color: #2453a6;
}

.badge.evidence {
  background: #f0edf8;
  color: #5b3f8c;
}

.badge.relevance {
  background: #eaf7f5;
  color: #0a6c65;
}

.badge.lowrel {
  background: #fdecec;
  color: #9f2c2c;
}

.review-main {
  padding-top: 28px;
}

.review-panel {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.review-grid {
  display: grid;
  grid-template-columns: 360px minmax(0, 1fr);
  gap: 18px;
}

.review-list,
.editor {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.review-list {
  align-self: start;
  padding: 14px;
}

.review-items {
  display: grid;
  gap: 8px;
  max-height: 68vh;
  margin-top: 12px;
  overflow: auto;
}

.review-row {
  display: grid;
  gap: 5px;
  height: auto;
  min-height: 0;
  border-radius: 8px;
  padding: 11px;
  text-align: left;
}

.review-row strong {
  font-size: 14px;
  line-height: 1.45;
}

.review-row span,
.meta-line {
  color: var(--muted);
  font-size: 12px;
}

.review-row.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.editor {
  padding: 18px;
}

.editor-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}

.editor label {
  display: grid;
  gap: 7px;
  margin-bottom: 14px;
  color: var(--muted);
  font-size: 13px;
}

textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--ink);
  font: inherit;
  line-height: 1.65;
  resize: vertical;
}

.review-options,
.editor-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin: 14px 0;
}

.ai-editor {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.review-options label {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 0;
  color: var(--ink);
}

.item h3 {
  margin: 0 0 10px;
  font-size: 20px;
  line-height: 1.35;
}

.translation {
  margin-bottom: 10px;
  color: var(--ink);
  font-size: 16px;
  line-height: 1.75;
}

.ai-read {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin: 0 0 12px;
}

.ai-read div {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: #fbfdfc;
}

.ai-read dt {
  margin-bottom: 5px;
  color: var(--accent-strong);
  font-size: 12px;
  font-weight: 800;
}

.ai-read dd {
  margin: 0;
  color: #34423f;
  font-size: 13px;
  line-height: 1.55;
}

.english {
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.65;
}

.insight {
  margin: 0 0 14px;
  padding: 12px;
  border-left: 3px solid var(--accent);
  background: #f6fbf9;
  color: #33423e;
  line-height: 1.7;
}

.links {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 14px;
}

.reading-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.reading-actions button {
  min-height: 32px;
  padding: 0 10px;
  font-size: 13px;
}

.detail-main {
  padding: 28px 0 44px;
}

.detail-shell {
  display: grid;
  gap: 18px;
}

.detail-article {
  display: grid;
  gap: 18px;
}

.detail-hero,
.detail-section {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 20px;
  background: var(--panel);
}

.detail-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 18px;
  box-shadow: var(--shadow);
}

.detail-facts {
  display: grid;
  gap: 10px;
}

.detail-facts span {
  display: grid;
  gap: 4px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 9px;
  color: var(--muted);
  font-size: 13px;
}

.detail-facts strong {
  color: var(--ink);
}

.detail-section h2 {
  margin-bottom: 12px;
  font-size: 20px;
}

.detail-read {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.briefing-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.briefing-section {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: var(--panel);
}

.briefing-section.wide {
  grid-column: 1 / -1;
}

.briefing-section h2 {
  margin-bottom: 12px;
  font-size: 20px;
}

.mini-list,
.topic-hubs {
  display: grid;
  gap: 12px;
}

.mini-list a {
  display: grid;
  gap: 5px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 11px;
  background: #fbfdfc;
}

.mini-list span {
  color: var(--muted);
  font-size: 13px;
}

.trial-feed {
  margin-top: 18px;
}

.topic-hub {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: var(--panel);
}

.topic-knowledge {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 14px;
}

.topic-knowledge div {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fbfdfc;
}

.topic-knowledge strong {
  display: block;
  margin-bottom: 6px;
  color: var(--accent-strong);
  font-size: 13px;
}

.topic-knowledge p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.bulk-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px 0;
}

.review-task-filter {
  margin-top: 12px;
}

.review-row {
  grid-template-columns: auto minmax(0, 1fr);
}

.review-row button {
  display: grid;
  gap: 5px;
  height: auto;
  min-height: 0;
  border: 0;
  padding: 0;
  background: transparent;
  text-align: left;
}

.row-check {
  display: flex;
  align-items: start;
  padding-top: 3px;
}

.row-check input {
  width: auto;
  min-height: 0;
}

.related-list {
  display: grid;
  gap: 10px;
}

.related-list a {
  display: grid;
  gap: 5px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fbfdfc;
}

.related-list span {
  color: var(--muted);
  font-size: 13px;
}

.empty-state {
  padding: 30px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
}

footer {
  width: min(1180px, calc(100% - 32px));
  margin: 28px auto 36px;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 900px) {
  .dashboard,
  .layout,
  .review-grid {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
  }

  .controls {
    align-items: stretch;
    flex-direction: column;
  }

  .review-panel,
  .editor-head {
    align-items: stretch;
    flex-direction: column;
  }

  .digest-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .trend-grid,
  .detail-hero,
  .detail-read,
  .briefing-grid,
  .topic-knowledge {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 620px) {
  .topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .status-pill {
    white-space: normal;
  }

  .intro {
    padding: 20px;
  }

  .item-top {
    align-items: flex-start;
    flex-direction: column;
  }

  .section-head {
    align-items: stretch;
    flex-direction: column;
  }

  .digest-grid,
  .trend-grid,
  .ai-read,
  .ai-editor {
    grid-template-columns: 1fr;
  }
}
</style>
    <style>
      .edge-tabs { display:flex; flex-wrap:wrap; gap:8px; margin:18px 0; }
      .edge-tabs button { border-radius:8px; }
      .edge-tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
      .edge-view { display:none; }
      .edge-view.active { display:block; }
      .edge-note { margin:16px 0; padding:12px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--muted); }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">ALS</span>
        <div>
          <strong>ALS 前沿研究进展</strong>
          <span>Edge 直开版 · 无需本地服务 · 数据已内嵌</span>
        </div>
      </div>
      <div class="status-pill">数据日期：2026-06-22</div>
    </header>
    <main>
      <section class="dashboard">
        <div class="intro">
          <p class="eyebrow">可直接用 Edge 打开</p>
          <h1>ALS 前沿研究进展情报站</h1>
          <p class="lead">这是单文件版本，适合直接双击打开预览。正式部署版仍建议使用 GitHub Pages 或本地服务。</p>
        </div>
        <div class="metrics">
          <div><span id="metricTotal">0</span><small>条进展</small></div>
          <div><span id="metricHigh">0</span><small>重点关注</small></div>
          <div><span id="metricIssues">0</span><small>质量问题</small></div>
        </div>
      </section>

      <section class="controls">
        <label class="searchbox">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="TDP-43、SOD1、C9orf72、ASO、NfL...">
        </label>
        <div class="edge-tabs">
          <button class="active" data-view="home">最新进展</button>
          <button data-view="briefing">每日简报</button>
          <button data-view="trials">临床试验</button>
          <button data-view="topics">专题</button>
          <button data-view="quality">质量</button>
          <button data-view="status">状态</button>
        </div>
      </section>

      <p class="edge-note">提示：这个文件不会自动每日更新。需要更新时，在项目里运行更新脚本后重新生成 Edge 版。</p>

      <section id="home" class="edge-view active"></section>
      <section id="briefing" class="edge-view"></section>
      <section id="trials" class="edge-view"></section>
      <section id="topics" class="edge-view"></section>
      <section id="quality" class="edge-view"></section>

    <script type="application/json" id="als-data">{"items":{"updatedAt":"2026-06-22","generatedBy":"scripts/update-feed.mjs","query":"\"amyotrophic lateral sclerosis\" OR \"motor neuron disease\" OR \"motor neurone disease\" OR \"SOD1 ALS\" OR \"C9orf72 ALS\" OR \"TDP-43 ALS\"","meta":{"daysBack":30,"needsReview":24,"sources":[{"source":"PubMed","ok":true,"count":8},{"source":"Europe PMC","ok":true,"count":8},{"source":"ClinicalTrials.gov","ok":true,"count":8}]},"items":[{"id":"pmid-42214472","publishedAt":"2026-06-22","source":"Journal of neuroscience methods","title":"Optimized multiplex immunofluorescent protocols for simultaneous in situ identification of α-motoneuron subtypes.","summary":"Accurate identification of α-motoneuron (α-MN) subtypes - slow (S), fast fatigue-resistant (FR), fast fatigue-intermediate (FI), and fast fatigable (FF) - is essential for studying motor circuit organization and selective vulnerability in neurodegenerative disease. While electrophysiological approaches can distinguish these subtypes, existing immunohistochemical (IHC) methods lack the ability to simultaneously identify all four α-MN classes in situ, particularly the FI subtype, limiting their utility for large-scale or tissue-based analyses. Here, we present novel multiplex immunofluorescent strategies that enables simultaneous in situ identification of S, FR, FI, and FF α-MN subtypes, including intermediate populations, within single sections of mouse lumbar spinal cord. This approach integrates a combinatorial marker framework with optimized co-labeling conditions to resolve subtype-specific molecular signatures, including FI MNs, which have not been previously distinguishable using standard IHC methods. We establish a systematic validation pipeline demonstrating robust and reproducible subtype classification across multiple protocols, sexes, mouse strains, and disease conditions, including the G93A-SOD mouse model of amyotrophic lateral sclerosis. Labeled populations recapitulate known size distributions and exhibit consistent subtype-specific patterns across lumbar segments, supporting both the accuracy and reproducibility of the method. By enabling comprehensive in situ classification of all major α-MN subtypes, this approach represents a substantive refinement of multiplex IF, overcoming key limitations of existing IF methods and enabling analyses of α-MN subtype organization and selective vulnerability that were previously not feasible with standard histological techniques. This framework is broadly applicable to studies of motor system organization, aging, and neurodegenerative disease.","url":"https://pubmed.ncbi.nlm.nih.gov/42214472/","doi":"10.1016/j.jneumeth.2026.110815","pmid":"42214472","trialId":"","origin":"PubMed","category":"机制","priority":"low","titleZh":"待复核翻译：Optimized multiplex immunofluorescent protocols for simultaneous in situ identification of α-motoneuron subtypes.","summaryZh":"自动抓取条目，分类为“机制”。英文摘要首句：Accurate identification of α-motoneuron (α-MN) subtypes - slow (S), fast fatigue-resistant (FR), fast fatigue-intermediate (FI), and fast fatigable (FF) - is essential for studying motor circuit organization and selective vulnerability in neurodegenerative disease. 涉及术语：amyotrophic lateral sclerosis=肌萎缩侧索硬化症。","insight":"PubMed 新近记录，建议复核摘要、研究设计和原文结论后进入精选列表。","tags":["ALS","机制"],"needsReview":true,"translationStatus":"machine-assisted-draft","evidenceLevel":"动物/细胞实验","aiRead":{"studyType":"动物/细胞实验","keyFinding":"Accurate identification of α-motoneuron (α-MN) subtypes - slow (S), fast fatigue-resistant (FR), fast fatigue-intermediate (FI), and fast fatigable (FF) - is essential for studying motor circuit organization and selective vulnerability in neurodegenerative disease.","limitation":"机器初筛结果，研究设计、样本量、终点和结论强度仍需人工复核。","watchNext":"关注是否从机制假说推进到动物模型、患者样本或治疗干预证据。"},"relevanceScore":5,"relevanceFlag":"medium"},{"id":"pmid-42251967","publishedAt":"2026-06-22","source":"Neurobiology of disease","title":"PBMC DEG/miRNA biomarkers of TDP-43 pathology in ALS.","summary":"Amyotrophic lateral sclerosis (ALS) lacks reliable, disease-specific, and minimally invasive biomarkers, representing a major barrier to early diagnosis and patient stratification. The primary aim of this translational pilot study was to identify a disease-specific, TDP-43-related, gene-microRNA (miRNA) signature in peripheral blood mononuclear cells (PBMCs) of ALS patients with potential diagnostic value. To this end, we first identified differentially expressed disease-specific genes (dsDEGs) using a TDP-43-based rat model of ALS, generated by stereotaxic infusion of full-length (FL) TAR DNA-binding protein 43 (TDP-43) into the motor cortex. Transcriptomic profiling of the motor cortex revealed candidate dsDEGs, which were subsequently validated by RT-qPCR in motor cortex, spinal cord, and PBMCs from the same animals. To assess translational relevance, expression levels of these dsDEGs were analyzed in PBMCs from early- to mid-stage ALS patients and matched healthy controls, while disease specificity was evaluated using Parkinson's disease (PD) samples. In parallel, conserved miRNAs predicted to target the identified dsDEGs were examined in both rat and human PBMCs. Five dsDEGs, Mctp1, Penk, Mt2A, Drd1, and Rasgrp2, were consistently dysregulated across central and peripheral tissues in the TDP-43 rat model. RT-qPCR analysis of human PBMCs confirmed significant and selective dysregulation of these genes in ALS, but not in PD, supporting disease specificity. Moreover, exposure of human neuroblastoma cells and healthy PBMCs to TDP-43 recapitulated the ALS-like expression changes. Computational and experimental analyses identified seven conserved miRNAs targeting these dsDEGs, of which four were significantly downregulated in ALS PBMCs, supporting a coordinated regulatory network. Receiver operating characteristic (ROC) analyses demonstrated strong discriminative performance for both the gene signature (AUC 0.87-1.00) and the associated miRNAs (AUC 0.95-1.00). Together, these findings define a novel PBMC-based gene-miRNA signature that mirrors central ALS pathology and shows high diagnostic accuracy and disease specificity, highlighting its potential as a minimally invasive biomarker for ALS.","url":"https://pubmed.ncbi.nlm.nih.gov/42251967/","doi":"10.1016/j.nbd.2026.107473","pmid":"42251967","trialId":"","origin":"PubMed","category":"生物标志物","priority":"medium","titleZh":"PBMC DEG/miRNA 生物标志物s of TDP-43 pathology in ALS.","summaryZh":"自动抓取条目，分类为“生物标志物”。英文摘要首句：Amyotrophic lateral sclerosis (ALS) lacks reliable, disease-specific, and minimally invasive biomarkers, representing a major barrier to early diagnosis and patient stratification. 涉及术语：amyotrophic lateral sclerosis=肌萎缩侧索硬化症；biomarker=生物标志物。","insight":"该条目可能影响 ALS 诊断、分层或疗效评估，建议关注样本来源、队列规模和是否经过外部验证。","tags":["ALS","TDP-43","FUS","RNA代谢","生物标志物"],"needsReview":true,"translationStatus":"machine-assisted-draft","evidenceLevel":"观察性临床研究","aiRead":{"studyType":"观察性临床研究","keyFinding":"Amyotrophic lateral sclerosis (ALS) lacks reliable, disease-specific, and minimally invasive biomarkers, representing a major barrier to early diagnosis and patient stratification.","limitation":"机器初筛结果，研究设计、样本量、终点和结论强度仍需人工复核。","watchNext":"关注外部验证、检测平台稳定性和能否预测进展或疗效。"},"relevanceScore":11,"relevanceFlag":"high"},{"id":"pmid-42242586","publishedAt":"2026-06-22","source":"Neurobiology of disease","title":"Early-onset neuroinflammation drives neurodegeneration caused by lysosomal PI(3,5)P 2 insufficiency.","summary":"Phosphatidylinositol 3,5-bisphosphate [PI(3,5)P 2 ] is a lysosomal signaling lipid whose deficiency, caused by mutations in the PIKfyve complex subunits FIG4 or VAC14, underlies a spectrum of fatal neurologic diseases including Charcot-Marie-Tooth type 4J (CMT4J) and amyotrophic lateral sclerosis (ALS). To map the molecular consequences of PI(3,5)P 2 insufficiency in the brain, we performed quantitative proteomic and transcriptomic analyses of three mouse lines bearing distinct loss-of-function mutations in Fig4 or Vac14, examining the brain at the presymptomatic and end stages. Strikingly, profound neuroinflammation was already present at postnatal day 5 (before significant neurodegeneration), characterized by complement activation, interferon signaling, and parenchymal infiltration of peripheral myeloid cells and T-cells. Isolated mutant microglia exhibited a markedly pro-oxidative transcriptional state with elevated reactive oxygen species, a partly non-cell-autonomous phenotype, being present in microglia from mice with conditional Fig4 inactivation in just neurons and astrocytes. Comparison of early (P5) and late (P25) proteomics data revealed that PI(3,5)P 2 insufficiency impairs developmental remodeling of the brain proteome: proteins typically upregulated during postnatal maturation failed to accumulate, implicating lysosomal function in neurodevelopment. We identify coordinated elevation of p53, Fas receptor, inflammatory caspases, Gasdermin D, RIPK1, and ZBP1, consistent with multifactorial inflammatory cell death with features of apoptosis, pyroptosis, and necroptosis. Many of the dysregulated proteins are encoded by genes mutated in lysosomal storage disorders, ALS, CMT, Alzheimer's and Parkinson diseases, extending the pathogenic relevance of PI(3,5)P 2 insufficiency. Together, these findings establish that early neuroinflammation is a defining - and likely initiating - feature of neurodegeneration caused by disruption of lysosomal PI(3,5)P 2 .","url":"https://pubmed.ncbi.nlm.nih.gov/42242586/","doi":"10.1016/j.nbd.2026.107467","pmid":"42242586","trialId":"","origin":"PubMed","category":"临床试验","priority":"medium","titleZh":"Early-onset 神经炎症 drives neurodegeneration caused by lysosomal PI(3,5)P 2 insufficiency.","summaryZh":"自动抓取条目，分类为“临床试验”。英文摘要首句：Phosphatidylinositol 3,5-bisphosphate [PI(3,5)P 2 ] is a lysosomal signaling lipid whose deficiency, caused by mutations in the PIKfyve complex record found, but no abstract was available in the fetched metadata.","limitation":"机器初筛结果，研究设计、样本量、终点和结论强度仍需人工复核。","watchNext":"关注变异人群比例、功能证据和是否能转化为分型治疗。"},"relevanceScore":5,"relevanceFlag":"medium"},{"id":"pmid-42247653","publishedAt":"2026-06-22","source":"Neurology","title":"Drivers of Rising Prevalence in Major Motor Neurodegenerative Diseases: Temporal Trends in Sweden and France (2003-2022).","summary":"The prevalence of Parkinson disease (PD), multiple sclerosis (MS), and motor neuron diseases (MNDs) is rising globally. However, it is unclear to what degree this is related to an increase in incidence or to improved survival after diagnosis. We performed 2 nationwide, population-based, retrospective cohort studies, including all individuals living in Sweden between 2001 and 2016 and living in France between 2009 and 2022, respectively. Pooled mixed-effects regression models, with country as a random effect, were used to determine temporal trends in prevalence, crude and age-standardized and sex-standardized incidence, and age and life expectancy at diagnosis. Annualized prevalence of PD, MS, and MNDs increased significantly between 2003 and 2022 in the pooled model (PD: prevalence ratio [PR] per year = 1.014, p \u003c 0.001; MS: PR = 1.029, p \u003c 0.001; MND: PR = 1.028, p \u003c 0.001). While the crude incidence of both PD and MS remained nearly stable over time (PD: incidence rate ratio [IRR] per year = 0.998, p \u003c 0.001; MS: IRR = 0.992, p \u003c 0.001), the standardized incidence showed a more marked decrease for PD (IRR = 0.986, p \u003c 0.001) while remaining almost unchanged for MS (IRR = 0.995, p \u003c 0.001). For MNDs, both the crude and standardized incidence increased over time (crude IRR = 1.018, p \u003c 0.001; standardized IRR = 1.008, p \u003c 0.001). Life expectancy at diagnosis of PD increased between 2003 and 2013 (+0.95 months per calendar year, p \u003c 0.001) and then decreased between 2013 and 2022 (-1.20 months, p = 0.002), while it increased significantly over the entire study period for MS (+2.35 months, p \u003c 0.001) and MNDs (+0.34 months, p = 0.01). These findings indicate that the rising MS prevalence is largely survival-driven and the rising MND prevalence reflects a true increase in incidence, whereas PD prevalence grows modestly, largely independent of incidence. Depending on the mechanism that drives prevalence, whether increased incidence reflecting changing risk factor exposures, improved survival due to therapeutic advances, or demographic aging of the population, inferences about underlying causes differ substantially between PD, MS, and MNDs, with direct implications for health care planning and etiologic research.","url":"https://pubmed.ncbi.nlm.nih.gov/42247653/","doi":"10.1212/WNL.0000000000218072","pmid":"42247653","trialId":"","origin":"PubMed","category":"治疗","priority":"medium","titleZh":"待复核翻译：Drivers of Rising Prevalence in Major Motor Neurodegenerative Diseases: Temporal Trends in Sweden and France (2003-2022).","summaryZh":"自动抓取条目，分类为“治疗”。英文摘要首句：The prevalence of Parkinson disease (PD), multiple sclerosis (MS), and motor neuron diseases (MNDs) is rising globally. 涉及术语：motor neuron disease=运动神经元病。","insight":"该条目涉及潜在治疗策略，应区分动物实验、早期临床和确证性临床结果，并优先核查原文终点和样本量。","tags":["ALS","治疗"],"needsReview":true,"translationStatus":"machine-assisted-draft","evidenceLevel":"观察性临床研究","aiRead":{"studyType":"观察性临床研究","keyFinding":"The prevalence of Parkinson disease (PD), multiple sclerosis (MS), and motor neuron diseases (MNDs) is rising globally.","limitation":"机器初筛结果，研究设计、样本量、终点和结论强度仍需人工复核。","watchNext":"关注是否进入人体试验、疗效终点、样本量和安全性信号。"},"relevanceScore":4,"relevanceFlag":"medium"},{"id":"pmid-42214042","publishedAt":"2026-06-22","source":"Neurology","title":"Diagnostic Revision From Primary Lateral Sclerosis to Amyotrophic Lateral Sclerosis: A Cohort Study.","summary":"Primary lateral sclerosis (PLS) is defined as a pure upper motor neuron syndrome and is a diagnosis of exclusion, amyotrophic lateral sclerosis (ALS) being the most likely alternative diagnostic consideration. A minimum disease duration of 2 years is required for the diagnosis of PLS, after which patients are classified as probable PLS (P-PLS) and subsequently as definite PLS (D-PLS) after 4 years. Our aim is to apply the current diagnostic criteria to a population-based cohort and investigate which clinical characteristics are associated with a diagnostic revision to ALS. This cohort study included patients meeting the current diagnostic criteria for PLS retrospectively from the Dutch Motor Neuron Disease Registry. Diagnostic revision to ALS was based on clinical assessment, EMG findings according to the revised El Escorial Criteria, or if patients had died from disease progression within 4 years of disease onset. Clinical characteristics were compared for patients who underwent diagnostic revision with ALS vs true PLS. Subdistribution hazard ratios (SHRs) for characteristics associated with diagnostic revision were determined using Fine-Gray regression. We included 478 patients (median age of onset 59.3 years, interquartile range 50.8-67.0, 47.9% female), of whom 311 (65.1%) met criteria for P-PLS and 167 (34.9%) for D-PLS at diagnosis. Eighty-eight patients (18%) underwent diagnostic revision to ALS, 76 cases (86%) before 4 years of disease duration. Patients whose diagnosis was revised to ALS had higher median age at onset (63.4 vs 58.0 years, p = 5.20 × 10 -4 ), more often had bulbar onset (38.6% vs 19.7%, p = 6.19 × 10 -4 ), and faster progression (median ALS Functional Rating Scale-revised slope 0.43 vs 0.18, p = 6.05 × 10 -11 ). The risk of diagnostic revision increased if progression rate was faster (SHR 3.08 95% CI 1.69-5.60, p = 2.35 × 10 -4 ) and if diagnosis was P-PLS compared with D-PLS (SHR 3.08, 95% CI 1.65-5.74, p = 3.96 × 10 -4 ). In our cohort, most diagnostic revisions from PLS to ALS were in patients with a disease duration of less than 4 years. Besides disease duration, a faster progression rate was associated with diagnostic revision from PLS to ALS. Adding progression rate to the current diagnostic criteria could increase accuracy and help identify patients at higher risk of developing ALS.","url":"https://pubmed.ncbi.nlm.nih.gov/42214042/","doi":"10.1212/WNL.0000000000218055","pmid":"42214042","trialId":"","origin":"PubMed","category":"临床试验","priority":"medium","titleZh":"Diagnostic Revision From Primary Lateral Sclerosis to 肌萎缩侧索硬化症: A Cohort Study.","summaryZh":"自动抓取条目，分类为“临床试验”。英文摘要首句：Primary lateral sclerosis (PLS) is defined as a pure upper motor neuron syndrome and is a diagnosis of exclusion, amyotrophic lateral sclerosis (ALS) being the most likely alternative diagnostic consideration. 涉及术语：amyotrophic lateral sclerosis=肌萎缩侧索硬化症；motor neuron disease=运动神经元病。","insight":"该条目来自临床试验注册库，重点关注入组状态、分期、干预方式、终点和最近更新时间，不能等同于疗效已经证实。","tags":["ALS","RNA代谢","生物标志物","临床试验"],"needsReview":true,"translationStatus":"machine-assisted-draft","evidenceLevel":"观察性临床研究","aiRead":{"studyType":"观察性临床研究","keyFinding":"Primary lateral sclerosis (PLS) is defined as a pure upper motor neuron syndrome and is a diagnosis of exclusion, amyotrophic lateral sclerosis (ALS) being the most likely alternative diagnostic consideration.","limitation":"机器初筛结果，研究设计、样本量、终点和结论强度仍需人工复核。","watchNext":"关注入组状态、主要终点、结果发布日期和是否有同类药物对照。"},"relevanceScore":11,"relevanceFlag":"high","trial":{"status":"","phase":"","enrollment":null,"startDate":"","completionDate":"","primaryOutcomes":[],"interventionTypes":[],"interventions":[],"sponsor":""}},{"id":"pmid-42324254","publishedAt":"2026-06-21","source":"Journal of neurophysiology","title":"Direct evidence of upper motor neuron excitability changes in a patient with ALS.","summary":"A key feature of amyotrophic lateral sclerosis (ALS) pathophysiology is motor neuron hyperexcitability. However, the mechanisms of hyperexcitability are not well understood. Prior studies have used transcranial magnetic stimulation (TMS) to demonstrate increased motor cortex excitability and reduced intracortical inhibition in human ALS. Yet interpretation of these findings is limited because measurement of muscles responses cannot disentangle specific contribution of upper and lower motor neurons and of cortical interneurons to excitability changes. We had the rare opportunity to record directly the corticospinal output evoked by TMS upstream of the spinal circuitry in an ALS patient who had undergone epidural electrode implantation for intractable pain. Single pulse stimulation was performed both with a coil orientation inducing a current that activates corticospinal neurons directly, and with a coil orientation inducing a current that activates corticospinal neurons trans-synaptically. Short interval intracortical inhibition (SICI) was also studied using paired pulse stimulation. Data obtained in the patient were compared with those recorded in 10 conscious control subjects. Compared to control subjects, patient showed a reduced amplitude in response to direct corticospinal neuron activation, yet an enhanced amplitude of corticospinal output after trans-synaptic corticospinal neuron activation together with a SICI reduction. Present findings provide direct evidence of hyperexcitability of monosynaptic glutamatergic inputs to corticospinal neurons that, in association with reduced intracortical inhibition, can trigger neurodegeneration. Taken together with the extensive body of evidence generated by non-invasive TMS studies, the findings from this single-case study may provide valuable insights into the pathophysiological mechanisms of the disease.","url":"https://pubmed.ncbi.nlm.nih.gov/42324254/","doi":"10.1152/jn.00208.2026","pmid":"42324254","trialId":"","origin":"PubMed","category":"机制","priority":"low","titleZh":"待复核翻译：Direct evidence of upper motor neuron excitability changes in a patient with ALS.","summaryZh":"自动抓取条目，分类为“机制”。英文摘要首句：A key feature of amyotrophic lateral sclerosis (ALS) pathophysiology is motor neuron hyperexcitability. 涉及术语：amyotrophic lateral sclerosis=肌萎缩侧索硬化症。","insight":"PubMed 新近记录，建议复核摘要、研究设计和原文结论后进入精选列表。","tags":["ALS","机制"],"needsReview":true,"translationStatus":"machine-assisted-draft","evidenceLevel":"机制研究","aiRead":{"studyType":"机制研究","keyFinding":"A key feature of amyotrophic lateral sclerosis (ALS) pathophysiology is motor neuron hyperexcitability.","limitation":"机器初筛结果，研究设计、样本量、终点和结论强度仍需人工复核。","watchNext":"关注是否从机制假说推进到动物模型、患者样本或治疗干预证据。"},"relevanceScore":7,"relevanceFlag":"high"},{"id":"pmid-42323839","publishedAt":"2026-06-21","source":"Disability and rehabilitation","title":"The all-encompassing nature of motor neuron disease caregiving: a qualitative study of Australian caregivers.","summary":"Caregivers of people living with motor neuron disease (plwMND) experience high levels of burden. This study sought to explore the burdens and challenges caregivers faced in their caregiving roles through qualitative investigations of caregiver experiences, to assist in identifying caregivers' priorities for change and improving current caregiving circumstances. The experiences of 12 caregivers of plwMND were explored using a qualitative descriptive methodology. All participants took part in semi-structured interviews, and interview transcripts were analysed via content analysis. Themes developed from the interviews highlighted the complex, interconnected and all-encompassing nature of MND caregiving. This was described across five themes: (1) \"It begins before diagnosis,\" (2) \"The relentlessness of care,\" (3) \"Traversing the MND health care and support landscape,\" (4) \"Changes to social connectivity,\" and (5) \"Caregiver well-being.\" This study highlights Australian caregivers' perspectives on the burden and challenges they face in their roles as caregivers for plwMND. Insights suggested that the MND caregiving role is highly interconnected and pervasive, and caregivers report that they are not always receiving the level of care and support that they and their plwMND require. System-level change that embraces more personalised, integrated, multi-disciplinary models of care for MND is likely to strengthen coordinated access to services and elevate the role of informal caregivers within care teams. Improving caregiver circumstances, support, and well-being could potentially lead to better outcomes for both caregivers and those they care for. Understanding the burdens and challenges experienced by caregivers of people living with motor neuron disease and how they connect within the caregiving role is integral to ensuring that caregivers receive appropriate resources and support.Caregivers report inadequate support, which not only affects caregivers but also affects people living with motor neuron disease(plwMND)’s decision-making processes and their access and engagement with health and support services.Due to the all-encompassing and interconnected nature of the burdens and challenges caregivers of people living with motor neuron disease experience, system-level intervention is likely required.Further development of integrated multidisciplinary care models show promise for elevating the status of caregivers within multidisciplinary teams and fostering lateral communication strategies among health and support professionals, easing navigational challenges reported by caregivers.","url":"https://pubmed.ncbi.nlm.nih.gov/42323839/","doi":"10.1080/09638288.2026.2690908","pmid":"42323839","trialId":"","origin":"PubMed","category":"机制","priority":"low","titleZh":"The all-encompassing nature of 运动神经元病 caregiving: a qualitative study of Australian caregivers.","summaryZh":"自动抓取条目，分类为“机制”。英文摘要首句：Caregivers of people living with motor neuron disease (plwMND) experience high levels of burden. 涉及术语：motor neuron disease=运动神经元病。","insight":"PubMed 新近记录，建议复核摘要、研究设计和原文结论后进入精选列表。","tags":["ALS","RNA代谢","机制"],"needsReview":true,"translationStatus":"machine-assisted-draft","evidenceLevel":"机制研究","aiRe     <script>
      const DATA = JSON.parse(document.querySelector("#als-data").textContent);
      const overrides = DATA.overrides.items || {};
      const items = (DATA.items.items || []).map(item => ({ ...item, ...(overrides[item.id] || {}) }));
      const state = { query: "" };
      const $ = s => document.querySelector(s);
      const esc = v => String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
      const fmt = d => new Intl.DateTimeFormat("zh-CN", { year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date(d));
      const score = item => ({high:4,medium:2,low:0}[item.priority] || 0) + Math.min(item.relevanceScore || 0, 6) / 2 + (item.featured ? 4 : 0) + (item.reviewed ? 2 : 0);
      const filter = rows => rows.filter(item => [item.title,item.titleZh,item.summary,item.summaryZh,item.insight,(item.tags||[]).join(" ")].join(" ").toLowerCase().includes(state.query.toLowerCase()));

      function card(item) {
        return `<article class="item">
          <div class="item-top"><div class="meta"><span>${fmt(item.publishedAt)}</span><span>${esc(item.source)}</span><span>${esc(item.category)}</span></div><div class="badges"><span class="badge evidence">${esc(item.evidenceLevel || "待判定")}</span><span class="badge relevance">相关性 ${esc(item.relevanceScore ?? "待判定")}</span></div></div>
          <h3>${esc(item.titleZh || item.title)}</h3>
          <p class="translation">${esc(item.summaryZh || "")}</p>
          <dl class="ai-read"><div><dt>研究类型</dt><dd>${esc(item.aiRead?.studyType || item.evidenceLevel || "")}</dd></div><div><dt>关键发现</dt><dd>${esc(item.aiRead?.keyFinding || item.insight || "")}</dd></div><div><dt>局限性</dt><dd>${esc(item.aiRead?.limitation || "待复核")}</dd></div><div><dt>下一步关注</dt><dd>${esc(item.aiRead?.watchNext || "")}</dd></div></dl>
          <p class="english"><strong>Original:</strong> ${esc(item.title)}. ${esc(item.summary)}</p>
          <div class="links"><a href="${esc(item.url)}" target="_blank" rel="noreferrer">原文链接</a></div>
        </article>`;
      }
      function countBy(rows, fn) { return rows.reduce((a, x) => { const k = fn(x) || "未分类"; a[k] = (a[k] || 0) + 1; return a; }, {}); }
      function trend(title, counts) {
        const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
        const max = Math.max(1, ...entries.map(x=>x[1]));
        return `<article class="trend-card"><h3>${esc(title)}</h3><div class="trend-bars">${entries.map(([k,v])=>`<div class="trend-row"><span>${esc(k)}</span><div><i style="width:${Math.max(8, Math.round(v/max*100))}%"></i></div><b>${v}</b></div>`).join("")}</div></article>`;
      }
      function renderHome() {
        $("#home").innerHTML = `<section class="feed-list">${filter(items).map(card).join("")}</section>`;
      }
      function renderBriefing() {
        const top = filter(items).filter(x => x.relevanceFlag !== "low").sort((a,b)=>score(b)-score(a)).slice(0,5);
        $("#briefing").innerHTML = `<section class="digest"><div class="section-head"><div><p class="eyebrow">精选日报</p><h2>优先阅读</h2></div></div><div class="digest-grid">${top.map(x => `<article class="digest-card"><div class="meta"><span>${fmt(x.publishedAt)}</span><span>${esc(x.category)}</span></div><h3>${esc(x.titleZh || x.title)}</h3><p>${esc(x.aiRead?.keyFinding || x.insight || "")}</p><a href="${esc(x.url)}" target="_blank">原文</a></article>`).join("")}</div></section>`;
      }
      function renderTrials() {
        const rows = filter(items).filter(x => x.trialId || x.category === "临床试验");
        $("#trials").innerHTML = `<section class="trend-grid">${trend("试验状态", countBy(rows, x => x.trial?.status || "待核查"))}${trend("分期", countBy(rows, x => x.trial?.phase || "待核查"))}</section><section class="feed-list trial-feed">${rows.map(card).join("") || "<p class='empty-state'>暂无临床试验。</p>"}</section>`;
      }
      function renderTopics() {
        const topicRows = DATA.topics.topics || [];
        $("#topics").innerHTML = topicRows.map(topic => {
          const rows = filter(items).filter(item => [item.title,item.titleZh,item.summary,item.summaryZh,item.insight,(item.tags||[]).join(" ")].join(" ").toLowerCase().includes((topic.terms || []).find(term => [item.title,item.titleZh,item.summary,item.summaryZh,item.insight,(item.tags||[]).join(" ")].join(" ").toLowerCase().includes(term.toLowerCase()))?.toLowerCase() || "\u0000")).slice(0,5);
          return `<section class="topic-hub"><div class="section-head"><div><p class="eyebrow">${rows.length} 条相关</p><h2>${esc(topic.name)}</h2></div><span>${esc(topic.intro)}</span></div><div class="topic-knowledge"><div><strong>关键术语</strong><p>${esc((topic.keyTerms||[]).join(" · "))}</p></div><div><strong>代表性关注点</strong><p>${esc((topic.representativeStudies||[]).join("；"))}</p></div></div><div class="digest-grid">${rows.map(x => `<article class="digest-card"><h3>${esc(x.titleZh || x.title)}</h3><p>${esc(x.insight || "")}</p><a href="${esc(x.url)}" target="_blank">原文</a></article>`).join("") || "<p class='empty-state'>暂无。</p>"}</div></section>`;
        }).join("");
      }
      function renderQuality() {
        const q = DATA.quality;
        $("#quality").innerHTML = `<section class="trend-grid">${trend("问题类型", q.issueCounts || {})}${trend("复核状态", q.reviewCounts || {})}${trend("相关性", q.relevanceCounts || {})}</section><section class="briefing-section"><h2>疑似误收</h2><div class="mini-list">${(q.lowRelevance||[]).map(x=>`<a href="${esc(x.url)}" target="_blank"><strong>${esc(x.titleZh || x.title)}</strong><span>相关性 ${esc(x.relevanceScore)}</span></a>`).join("") || "<p class='empty-state'>暂无。</p>"}</div></section>`;
      }
      function renderStatus() {
        const s = DATA.status;
        $("#status").innerHTML = `<section class="trend-grid">${trend("状态", {"数据条目":s.itemCount||0,"质量问题":s.qualityIssues||0,"归档快照":s.archiveSnapshots||0,"启用数据源":s.activeSources||0})}</section>`;
      }
      function renderAll() {
        $("#metricTotal").textContent = items.length;
        $("#metricHigh").textContent = items.filter(x => x.priority === "high").length;
        $("#metricIssues").textContent = DATA.quality.summary?.issueCount || 0;
        renderHome(); renderBriefing(); renderTrials(); renderTopics(); renderQuality(); renderStatus();
      }
      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => {
        document.querySelectorAll("[data-view]").forEach(x => x.classList.toggle("active", x === btn));
        document.querySelectorAll(".edge-view").forEach(x => x.classList.toggle("active", x.id === btn.dataset.view));
      }));
      $("#searchInput").addEventListener("input", e => { state.query = e.target.value; renderAll(); });
      renderAll();
    </script>
  </body>
</html>
